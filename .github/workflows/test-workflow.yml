name: OpenClaw Operator Test

on:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run sanity script
        run: |
          echo "OpenClaw operator test — run at $(date -u)"
          uname -a
          df -h
      - name: Notify webhook
        run: |
          curl -sS -X POST -H "Content-Type: application/json" -d "{\"status\":\"success\",\"branch\":\"${GITHUB_REF_NAME}\",\"sha\":\"${GITHUB_SHA}\"}" "https://example-webhook.example/webhook"