name: OpenClaw Operator Test

on:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run sanity script
        run: |
          echo "OpenClaw operator test — $(date -u)"
          uname -a
          df -h

      - name: Notify webhook
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: |
          curl -sS -X POST \
            -H "Content-Type: application/json" \
            -d "{\"status\":\"success\",\"branch\":\"$GITHUB_REF_NAME\",\"sha\":\"$GITHUB_SHA\"}" \
            "${WEBHOOK_URL:-http://localhost:5678/webhook/github-push}"
